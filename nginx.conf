server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/html text/css application/javascript image/svg+xml application/json;

  # Redirections app : les anciennes URLs de l'application (favoris clients)
  # partent vers app.labflow-tn.com — la vitrine occupe désormais l'apex.
  location ~ ^/(login|client|admin|portail|invite|reset-password|forgot-password|error) {
    return 301 https://app.labflow-tn.com$request_uri;
  }

  # Les captures et fichiers de preuve changent rarement — cache long
  location /assets/ {
    add_header Cache-Control "public, max-age=604800";
  }

  location / {
    try_files $uri $uri.html =404;
    add_header Cache-Control "public, max-age=600";
  }

  error_page 404 /index.html;
}
