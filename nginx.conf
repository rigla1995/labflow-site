server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/html text/css application/javascript image/svg+xml application/json;

  # Page d'erreur personnalisée : sans elle, le « =404 » du try_files (plus bas)
  # rend la page blanche par défaut de nginx — pas de logo, pas de lien, pas de
  # CTA. C'est ce que verraient /prix, /pricing, /tarifs-labflow et tout partage
  # approximatif. 404.html est noindex et hors sitemap.
  # Pas de « internal » sur /404.html : la recette (tools/verify-pages.js) charge
  # la page par son URL directe et exige un 200. La rendre interne la ferait
  # répondre 404 en production et diverger du local sans rien apporter.
  error_page 404 /404.html;

  # ⚠️ D1 — AUCUNE redirection 301 sur /tarifs ni /tarifs.html.
  # La page est CONSERVÉE (meilleure position organique du site) : elle est
  # servie normalement par le bloc « location / » ci-dessous, sur ses deux URLs
  # (/tarifs.html et /tarifs, via le $uri.html du try_files).

  # Redirections app : les anciennes URLs de l'application (favoris clients)
  # partent vers app.labflow-tn.com — la vitrine occupe désormais l'apex.
  location ~ ^/(login|client|admin|portail|invite|reset-password|forgot-password|error) {
    return 301 https://app.labflow-tn.com$request_uri;
  }

  # Les captures et fichiers de preuve changent rarement — cache long
  location /assets/ {
    add_header Cache-Control "public, max-age=604800";
  }

  location / {
    # $uri/ déclenche l'index (sinon la racine « / » tombe en 404 malgré index.html)
    try_files $uri $uri.html $uri/ =404;
    add_header Cache-Control "public, max-age=600";
  }
}
